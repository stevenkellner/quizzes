<section class="card">
    <app-question-view
        mode="interactive"
        [question]="state.currentQuestion()!"
        [selectedAnswers]="state.selectedAnswers()"
        [revealed]="state.revealed()"
        (toggleAnswer)="state.toggleAnswer($event)"
    />
</section>

<div class="actions">
    <p
        class="status"
        [class.correct]="state.questionStatusMessage().kind === 'correct'"
        [class.incorrect]="state.questionStatusMessage().kind === 'incorrect'"
        aria-live="polite"
        aria-atomic="true"
    >{{ state.questionStatusMessage().text }}</p>
    @if (!state.revealed()) {
        <p class="hotkey-hint" aria-hidden="true">
            <kbd>1</kbd>–<kbd>N</kbd> Antwort wählen &nbsp;·&nbsp;
            <kbd>⇧</kbd>+<kbd>1</kbd>–<kbd>N</kbd> Alle außer N &nbsp;·&nbsp;
            <kbd>A</kbd> Alle wählen &nbsp;·&nbsp;
            <kbd>N</kbd> Keine wählen &nbsp;·&nbsp;
            <kbd>Enter</kbd> Bestätigen
        </p>
    }
    <button type="button" (click)="onAction()">{{ actionButtonText() }}</button>
</div>
