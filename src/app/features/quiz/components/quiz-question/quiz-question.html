<section class="card">
    <app-question-view
        mode="interactive"
        [question]="question()"
        [selectedAnswers]="selectedAnswers()"
        [revealed]="revealed()"
        (toggleAnswer)="toggleAnswer.emit($event)"
    />
</section>

<div class="actions">
    <p
        class="status"
        [class.correct]="statusMessage().kind === 'correct'"
        [class.incorrect]="statusMessage().kind === 'incorrect'"
        aria-live="polite"
        aria-atomic="true"
    >{{ statusMessage().text }}</p>
    <button type="button" (click)="onAction()">{{ actionButtonText() }}</button>
</div>
