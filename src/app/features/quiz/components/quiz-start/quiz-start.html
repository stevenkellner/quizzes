<section class="card" aria-labelledby="start-heading">
    <h2 id="start-heading" class="question">Quiz starten</h2>
    <a routerLink="/" class="back-link">← Zur Auswahl</a>
    <div class="start-form">
        <label for="question-count-id">Wie viele Fragen sollen gestellt werden?</label>
        <div class="start-row">
            <input
                #countInput
                id="question-count-id"
                type="number"
                [min]="1"
                [max]="state.maxQuestions()"
                [value]="state.defaultCount()"
                required
                class="count-input"
                aria-describedby="start-status"
            />
        </div>
        <label class="toggle-row" for="show-answer-toggle">
            <span>Korrekte Antwort nach jeder Frage anzeigen</span>
            <span
                class="toggle-track"
                [class.on]="state.showAnswerAfterGuess()"
                aria-hidden="true"
            >
                <span class="toggle-thumb"></span>
            </span>
            <input
                id="show-answer-toggle"
                type="checkbox"
                class="toggle-input"
                [checked]="state.showAnswerAfterGuess()"
                (change)="state.setShowAnswerAfterGuess($any($event.target).checked)"
            />
        </label>
    </div>
    <div class="or-divider" aria-hidden="true">oder</div>
    <button type="button" class="secondary-btn" (click)="state.navigateToSelect()">
        Fragen manuell auswählen →
    </button>
    <div class="or-divider" aria-hidden="true">oder</div>
    <a [routerLink]="['/fragen', state.quizId()]" class="secondary-btn">Alle Fragen ansehen →</a>
</section>

<div class="actions">
    <p
        id="start-status"
        class="status"
        [class.incorrect]="statusText()"
        aria-live="polite"
    >{{ statusText() }}</p>
    <button type="button" (click)="attemptStart()">Starten</button>
</div>
