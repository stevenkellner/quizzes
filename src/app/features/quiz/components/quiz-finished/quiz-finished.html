@if (state.finishedStats(); as stats) {
    <section class="card result-card" aria-labelledby="result-heading">
        <h2 id="result-heading" class="result-title">Quiz beendet</h2>
        <div class="title-divider" aria-hidden="true"></div>
        <div class="result-stats">
            <div class="stat">
                <span class="stat-value">{{ stats.percent }}%</span>
                <span class="stat-label">Ergebnis</span>
            </div>
            <div class="stat-divider" aria-hidden="true"></div>
            <div class="stat">
                <span class="stat-value">{{ stats.score }}&thinsp;/&thinsp;{{ stats.total }}</span>
                <span class="stat-label">Richtig</span>
            </div>
            <div class="stat-divider" aria-hidden="true"></div>
            <div class="stat">
                <span class="stat-value">{{ stats.timeStr }}</span>
                <span class="stat-label">Zeit</span>
            </div>
        </div>
    </section>
}

@if (state.wrongAnswers().length > 0) {
    <section class="card review-card" aria-labelledby="review-heading">
        <h2 id="review-heading" class="question">Falsche Antworten</h2>
        <div class="review-list">
            @for (wa of state.wrongAnswers(); track wa.question.text; let i = $index) {
                <div class="review-entry">
                    <app-question-view
                        mode="review"
                        [question]="wa.question"
                        [selectedInReview]="wa.selected"
                        [questionNumber]="i + 1"
                    />
                </div>
            }
        </div>
    </section>
}

<div class="actions">
    <button type="button" class="action-btn" (click)="state.restart()">Neu starten</button>
</div>
